name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Static analysis
        run: ./gradlew detekt

      - name: Unit tests
        run: ./gradlew :core:domain:test :feature:home:testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug :benchmark:assemble

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
